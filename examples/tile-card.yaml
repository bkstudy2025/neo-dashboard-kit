# Neo Tile Card examples
# Ersetze die Platzhalter-Entitäten durch deine eigenen Home-Assistant-Entities.

# Beispiel 1: Licht schalten
type: custom:neo-tile-card
entity: light.example_living_room # Ersetzen, z. B. light.wohnzimmer
name: Wohnzimmer Licht
icon: mdi:ceiling-light
show_state: true
secondary_info: last_changed
layout: compact
tap_action:
  action: toggle
hold_action:
  action: more-info

---

# Beispiel 2: Steckdose / Switch schalten
type: custom:neo-tile-card
entity: switch.example_socket # Ersetzen, z. B. switch.steckdose_tv
name: Steckdose
icon: mdi:power-socket-eu
show_state: true
secondary_info: entity_id
layout: compact
tap_action:
  action: toggle
hold_action:
  action: more-info

---

# Beispiel 3: Szene aktivieren
type: custom:neo-tile-card
entity: scene.example_evening # Ersetzen, z. B. scene.abendlicht
name: Abendmodus
icon: mdi:weather-night
show_state: false
secondary_info: none
layout: large
tap_action:
  action: call-service
  service: scene.turn_on
  target:
    entity_id: scene.example_evening

---

# Beispiel 4: Script starten
type: custom:neo-tile-card
entity: script.example_good_morning # Ersetzen, z. B. script.guten_morgen
name: Guten Morgen
icon: mdi:weather-sunny
show_state: false
secondary_info: none
layout: large
tap_action:
  action: call-service
  service: script.turn_on
  target:
    entity_id: script.example_good_morning